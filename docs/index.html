<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenAI Parameter Golf Leaderboard</title>
    <meta
      name="description"
      content="Track OpenAI Parameter Golf leaderboard records and public PR submissions in one place."
    >
    <link
      href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./styles.css?v=34">
  </head>
  <body>
    <div class="page-shell">
      <div class="topbar">
        <div class="topbar-mark">
          <span class="topbar-label">OpenAI Parameter Golf Leaderboard</span>
          <span class="topbar-meta">Explore records and public PR submissions easily.</span>
        </div>
        <div class="topbar-links">
          <a href="https://github.com/openai/parameter-golf" target="_blank" rel="noreferrer">Repo</a>
          <a href="https://github.com/openai/parameter-golf/pulls" target="_blank" rel="noreferrer">PR Queue</a>
        </div>
      </div>

      <main>
        <section class="summary-strip" id="summary-strip">
          <p class="summary-line">
            Current best is <strong><span id="best-open">-</span>,</strong> with a baseline of <strong><span id="best-official">-</span>,</strong> across <strong><span id="coverage-count">-</span> PRs,</strong> updated at <strong id="generated-at">Loading…</strong>.
          </p>
        </section>

        <section class="controls">
          <div class="controls-row">
            <label class="search-shell" for="search-input">
              <input id="search-input" type="search" placeholder="Search titles or authors…" autocomplete="off">
            </label>
            <div class="controls-rail">
              <div class="page-size-control" aria-label="Rows per page">
                <span class="page-size-label">Rows</span>
                <button class="page-size-button active" data-page-size="10" type="button">10</button>
                <button class="page-size-button" data-page-size="15" type="button">15</button>
                <button class="page-size-button" data-page-size="20" type="button">20</button>
                <button class="page-size-button" data-page-size="all" type="button">All</button>
              </div>
              <div class="toggle-group">
                <label class="inline-toggle" for="merged-only-toggle">
                  <input id="merged-only-toggle" type="checkbox">
                  <span>Merged only</span>
                </label>
                <label class="inline-toggle" for="scored-only-toggle">
                  <input id="scored-only-toggle" type="checkbox">
                  <span>Scored only</span>
                </label>
                <label class="inline-toggle" for="non-record-toggle">
                  <input id="non-record-toggle" type="checkbox">
                  <span>Hide non-record</span>
                </label>
              </div>
            </div>
          </div>
        </section>

        <section class="table-section">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th><button class="sort-button active" data-sort-key="rank" data-sort-default="asc" type="button">Rank</button></th>
                  <th><button class="sort-button" data-sort-key="run" data-sort-default="asc" type="button">Title</button></th>
                  <th><button class="sort-button" data-sort-key="score" data-sort-default="asc" type="button">Score</button></th>
                  <th><button class="sort-button" data-sort-key="loss" data-sort-default="asc" type="button">Loss</button></th>
                  <th><button class="sort-button" data-sort-key="author" data-sort-default="asc" type="button">Author</button></th>
                  <th><button class="sort-button" data-sort-key="date" data-sort-default="desc" type="button">Date (UTC)</button></th>
                  <th><button class="sort-button" data-sort-key="status" data-sort-default="asc" type="button">Status</button></th>
                  <th><button class="sort-button" data-sort-key="track" data-sort-default="desc" type="button">Track</button></th>
                </tr>
              </thead>
              <tbody id="submission-body">
                <tr>
                  <td colspan="8" class="loading-row">Loading public records…</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="table-footer">
            <nav id="pagination" class="pagination" aria-label="Pagination"></nav>
          </div>
        </section>
      </main>
      <footer class="site-footer">
        <a href="https://github.com/stpcoder" target="_blank" rel="noreferrer">Built by Taeho Je</a>
      </footer>
    </div>

    <script type="module" src="./app.js?v=28"></script>
  </body>
  </html>
